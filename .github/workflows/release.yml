name: Release

on:
  push:
    tags: ['v*']

permissions:
  id-token: write   # NuGet Trusted Publishing (OIDC) — no API key secret needed
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: production   # matches the NuGet Trusted Publishing policy's Environment claim
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Restore
        run: dotnet restore AspNet.Cache.sln

      - name: Build
        run: dotnet build AspNet.Cache.sln -c Release --no-restore -warnaserror /p:Version=${{ env.VERSION }}

      - name: Test
        run: dotnet test test/AspNet.Cache.Test/AspNet.Cache.Test.csproj -c Release --no-build

      - name: Pack
        run: >
          dotnet pack AspNet.Cache/AspNet.Cache.csproj -c Release --no-build -o out
          /p:Version=${{ env.VERSION }}
          /p:ContinuousIntegrationBuild=true

      - name: NuGet login (Trusted Publishing)
        id: nuget-login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: slipalison

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
        run: >
          dotnet nuget push "out/*.nupkg"
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" out/*.nupkg out/*.snupkg --generate-notes
