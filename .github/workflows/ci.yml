name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || 'https://sonarcloud.io' }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Setup Java 17 (SonarScanner requirement)
        if: env.SONAR_TOKEN != ''
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install SonarScanner for .NET
        if: env.SONAR_TOKEN != ''
        run: dotnet tool install --global dotnet-sonarscanner

      # Self-hosted SonarQube: set the SONAR_HOST_URL repo variable and REMOVE the /o: line below
      # (organization is a SonarCloud-only concept).
      - name: Begin SonarQube analysis
        if: env.SONAR_TOKEN != ''
        run: >
          dotnet sonarscanner begin
          /k:"$SONAR_PROJECT_KEY"
          /o:"$SONAR_ORGANIZATION"
          /d:sonar.token="$SONAR_TOKEN"
          /d:sonar.host.url="$SONAR_HOST_URL"
          /d:sonar.cs.opencover.reportsPaths="**/coverage.opencover.xml"
          /d:sonar.exclusions="benchmarks/**,samples/**"

      - name: Restore
        run: dotnet restore AspNet.Cache.sln

      - name: Build
        run: dotnet build AspNet.Cache.sln -c Release --no-restore -warnaserror

      - name: Test with coverage
        run: >
          dotnet test test/AspNet.Cache.Test/AspNet.Cache.Test.csproj -c Release --no-build
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=opencover
          /p:Threshold=80
          /p:ThresholdType=line
          /p:Include="[AspNet.Cache]*"

      - name: End SonarQube analysis
        if: env.SONAR_TOKEN != ''
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

  allocation-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Run benchmarks (short job)
        run: dotnet run -c Release --project benchmarks/AspNet.Cache.Benchmarks -- --filter "*CacheBenchmarks*" --job short --exporters json

      - name: Enforce allocation budgets
        shell: pwsh
        run: ./build/check-allocation-budgets.ps1
